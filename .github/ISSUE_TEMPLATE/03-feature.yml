name: Feature request
description: Suggest an idea
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing or inconvenient?
      placeholder: "There's no way to ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the feature look like?
      placeholder: "Add a ..."
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New API endpoint or parameter
        - New output format
        - Performance / caching
        - Documentation
        - Other
