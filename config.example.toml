[server]
# address to listen on, overridable via LISTEN env var
listen = ':8080'
# reject requests not arriving via Cloudflare
# require_cloudflare = false

[cache]
# Redis URL, overridable via REDIS_URL env var, omit to use in-memory cache
# redis_url = 'redis://localhost:6379'
# how long to cache successful lyrics results
ttl = '24h0m0s'
# how long to cache provider not-found results
miss_ttl = '1h0m0s'

[log]
# debug, info, warn, error
level = 'info'
# text or json
format = 'text'

[provider]
# timeout for provider requests
timeout = '5s'
# hide source from responses and /stats endpoint
hide = false

[ratelimit]
# max requests per window per IP
limit = 45
# rate limit time window
window = '1h0m0s'

# [metrics]
# address to expose Prometheus metrics on
# listen = ':9091'

# named proxy pools, providers reference a pool via proxy = "<name>"
# [proxies]
# [proxies.mypool]
# urls = ['socks5://user:pass@proxy1.example.com:1080']

[providers]
[providers.genius]
enable = true

[providers.kugou]
enable = true

[providers.lrclib]
enable = true
# which LRCLIB instance to use
# base_url = 'https://lrclib.net'

[providers.musixmatch]
enable = true
# how many tokens to use in rotation
# pool_size = 5

[providers.ytmusic]
enable = true
