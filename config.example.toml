# lrcmux configuration example

[server]
# also overridable via LISTEN env var
listen = ":8080"

[cache]
# also overridable via the REDIS_URL env var, omit to use memory cache
# redis_url = "redis://localhost:6379/0"
ttl = "24h"
miss_ttl = "1h"

[log]
level = "info" # debug, info, warn, error
format = "text" # text or json

[provider]
timeout = "3s"
# if true, hide provider source from responses and /stats endpoint
hide = false

[ratelimit]
limit = 45
window = "1h"

# [metrics]
# listen = ":9091"

# each section under [proxies.<name>] defines a pool, and
# providers reference it via `proxy = "<name>"`. each
# outgoing request is routed through a randomly picked proxy
# from the pool.
#
# [proxies.myname]
# urls = [
#   "http://user:pass@proxy1.example.com:8080",
#   "http://user:pass@proxy2.example.com:8080",
# ]

[providers.lrclib]
enable = true

[providers.kugou]
enable = true

[providers.ytmusic]
enable = true

[providers.genius]
enable = true

[providers.musixmatch]
enable = true
# pool_size = 3
