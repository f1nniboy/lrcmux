# lrcmux configuration example

[server]
# also overridable via PORT env var
listen = ":8080"
# reject any request whose Fly edge connection did not come from a Cloudflare IP.
require_cloudflare = false

[cache]
# also overridable via the REDIS_URL env var
redis = "redis://localhost:6379/0"
ttl = "24h"
miss_ttl = "1h"

[log]
level  = "info" # debug, info, warn, error
format = "text" # text or json

[provider]
timeout = "3s"
# if true, hide provider source from responses and /stats endpoint
hide = false

[ratelimit]
enabled = true
# requests per window, per client IP
limit   = 120
window  = "1h"

# each section under [proxies.<name>] defines a pool, and
# providers reference it via `proxy = "<name>"`. each
# outgoing request is routed through a randomly picked proxy
# from the pool.
#
# [proxies.myname]
# urls = [
#   "http://user:pass@proxy1.example.com:8080",
#   "http://user:pass@proxy2.example.com:8080",
# ]

[providers.lrclib]
enabled = true

[providers.kugou]
enabled = true

[providers.ytmusic]
enabled = true

[providers.genius]
enabled = true

[providers.musixmatch]
enabled = true

# [analytics]
# Plausible Analytics site key
# key = "pa-XXXXX"
