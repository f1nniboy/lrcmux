app = 'lrcmux'
primary_region = 'ams'

[build]
  dockerfile = '../Dockerfile'
  build-target = 'frontend'

[env]
  PORT = '3000'
  PUBLIC_API_URL = 'https://api.lrcmux.dev'
  API_URL = 'http://lrcmux-api.internal:8080'
  PLAUSIBLE_KEY = 'pa-clOrwruh22gIhXW1ATZzv'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 1000
    soft_limit = 800

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '512mb'
  cpus = 1
